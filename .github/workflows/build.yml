name: Build EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed "照片信息提取/photo_gps_extractor.py"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: photo_gps_extractor.exe
          path: dist/photo_gps_extractor.exe
